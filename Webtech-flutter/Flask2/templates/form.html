{% extends "base.html" %}

{% block title %}Form{% endblock %}

{% block content %}
<h2>Contact Form</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
    <label>Name:</label><br>
    <input type="text" name="name"><br><br>

    <label>Email:</label><br>
    <input type="text" name="email"><br><br>

    <button type="submit">Submit</button>
</form>
{% endblock %}
